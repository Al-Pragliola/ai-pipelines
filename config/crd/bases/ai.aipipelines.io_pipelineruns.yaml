---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: pipelineruns.ai.aipipelines.io
spec:
  group: ai.aipipelines.io
  names:
    kind: PipelineRun
    listKind: PipelineRunList
    plural: pipelineruns
    singular: pipelinerun
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.pipelineRef
      name: Pipeline
      type: string
    - jsonPath: .spec.issueKey
      name: Issue
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.currentStep
      name: Step
      type: string
    - jsonPath: .status.branch
      name: Branch
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: PipelineRun is the Schema for the pipelineruns API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: PipelineRunSpec defines the desired state of PipelineRun.
            properties:
              approvedStep:
                description: |-
                  approvedStep is set by the dashboard to approve a step that has requireApproval.
                  The controller checks this against the current waiting step to resume.
                type: string
              description:
                description: description is the task description for spot runs (runs
                  without a trigger event).
                type: string
              issueBody:
                description: issueBody is the body/description of the triggering issue.
                type: string
              issueKey:
                description: issueKey is the issue identifier (e.g. "PROJ-123" for
                  Jira, "#1" for GitHub).
                type: string
              issueNumber:
                description: issueNumber is the issue number that triggered this run.
                type: integer
              issueTitle:
                description: issueTitle is the title/summary of the triggering issue.
                type: string
              pipelineRef:
                description: pipelineRef is the name of the Pipeline CR this run belongs
                  to.
                type: string
              selectedRepo:
                description: |-
                  selectedRepo is the repo chosen by user when triage is not confident.
                  Set by the user or dashboard to resume a WaitingForInput pipeline.
                properties:
                  forkOwner:
                    description: forkOwner is the GitHub owner of the fork where changes
                      are pushed.
                    type: string
                  name:
                    description: name is the GitHub repository name.
                    type: string
                  owner:
                    description: owner is the GitHub repository owner.
                    type: string
                required:
                - name
                - owner
                type: object
            required:
            - pipelineRef
            type: object
          status:
            description: PipelineRunStatus defines the observed state of PipelineRun.
            properties:
              branch:
                description: branch is the git branch created for this run.
                type: string
              chatPodName:
                description: chatPodName is the name of the chat Pod created during
                  the approval phase.
                type: string
              conditions:
                description: conditions represent the current state of the PipelineRun.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              currentStep:
                description: currentStep is the name of the currently executing step.
                type: string
              diffJobName:
                description: diffJobName is the name of the diff preview Job created
                  when waiting for step approval.
                type: string
              finishedAt:
                description: finishedAt is when the run finished.
                format: date-time
                type: string
              orchestratorJob:
                description: orchestratorJob is the name of the orchestrator Job.
                type: string
              phase:
                description: phase is the overall phase of the pipeline run.
                enum:
                - Pending
                - Initializing
                - Running
                - WaitingForInput
                - Succeeded
                - Failed
                - Stopped
                - Deleting
                type: string
              pvcName:
                description: pvcName is the name of the workspace PVC.
                type: string
              resolvedRepo:
                description: resolvedRepo is the repo being used for this run (from
                  spec.repo or triage).
                properties:
                  forkOwner:
                    description: forkOwner is the GitHub owner of the fork where changes
                      are pushed.
                    type: string
                  name:
                    description: name is the GitHub repository name.
                    type: string
                  owner:
                    description: owner is the GitHub repository owner.
                    type: string
                required:
                - name
                - owner
                type: object
              startedAt:
                description: startedAt is when the run started.
                format: date-time
                type: string
              steps:
                description: steps tracks status of each step.
                items:
                  description: StepStatus tracks the execution state of a single step.
                  properties:
                    attempt:
                      description: attempt is the current attempt number.
                      type: integer
                    finishedAt:
                      description: finishedAt is when this step finished.
                      format: date-time
                      type: string
                    jobName:
                      description: jobName is the name of the K8s Job running this
                        step (for AI/shell steps).
                      type: string
                    message:
                      description: message contains error details on failure.
                      type: string
                    name:
                      description: name is the step name.
                      type: string
                    phase:
                      description: 'phase is the current phase: Pending, Running,
                        Succeeded, Failed.'
                      enum:
                      - Pending
                      - Initializing
                      - Running
                      - WaitingForInput
                      - Succeeded
                      - Failed
                      - Stopped
                      - Deleting
                      type: string
                    startedAt:
                      description: startedAt is when this step started.
                      format: date-time
                      type: string
                    type:
                      description: 'type is the step type: git-checkout, ai, shell,
                        git-push, triage.'
                      type: string
                  required:
                  - name
                  - phase
                  type: object
                type: array
              triageResult:
                description: triageResult holds the AI triage decision, if applicable.
                properties:
                  confidence:
                    description: confidence is the AI's confidence score (0.0-1.0)
                      as a string.
                    type: string
                  reasoning:
                    description: reasoning explains why the AI chose this repo.
                    type: string
                  repo:
                    description: repo is the repository the AI selected (e.g. "owner/name").
                    type: string
                type: object
              waitingFor:
                description: waitingFor describes what the pipeline is waiting for
                  (e.g. "repo-selection").
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
