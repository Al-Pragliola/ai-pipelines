---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: pipelines.ai.aipipelines.io
spec:
  group: ai.aipipelines.io
  names:
    kind: Pipeline
    listKind: PipelineList
    plural: pipelines
    singular: pipeline
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.triggerType
      name: Trigger
      type: string
    - jsonPath: .status.pollerActive
      name: Poller
      type: boolean
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Pipeline is the Schema for the pipelines API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: PipelineSpec defines the desired state of Pipeline.
            properties:
              ai:
                description: ai configures the AI runtime (container image, env, secrets).
                properties:
                  credentialsMountPath:
                    default: /tmp/gcp-creds.json
                    description: credentialsMountPath is where to mount the credentials
                      file inside the AI container.
                    type: string
                  env:
                    additionalProperties:
                      type: string
                    description: env is additional environment variables for the AI
                      container.
                    type: object
                  image:
                    description: image is the container image for AI steps (e.g. "ai-pipelines-claude:latest").
                    type: string
                  imagePullPolicy:
                    default: IfNotPresent
                    description: imagePullPolicy for the AI container. Set to "Never"
                      for pre-loaded images (e.g. kind).
                    type: string
                  secretRef:
                    description: secretRef references a K8s Secret to mount as credentials
                      into AI pods.
                    properties:
                      key:
                        default: token
                        description: key is the key within the Secret. Defaults to
                          "token".
                        type: string
                      name:
                        description: name is the name of the Secret.
                        type: string
                    required:
                    - name
                    type: object
                required:
                - image
                type: object
              repo:
                description: |-
                  repo configures the git repository for checkout/push steps.
                  Required unless the pipeline uses a triage step to select the repo.
                properties:
                  forkOwner:
                    description: forkOwner is the owner of the fork to push to. Defaults
                      to owner.
                    type: string
                  name:
                    description: name is the GitHub repository name.
                    type: string
                  owner:
                    description: owner is the GitHub repository owner.
                    type: string
                  secretRef:
                    description: |-
                      secretRef references a K8s Secret containing the git token.
                      The secret must have a key named "token".
                    properties:
                      key:
                        default: token
                        description: key is the key within the Secret. Defaults to
                          "token".
                        type: string
                      name:
                        description: name is the name of the Secret.
                        type: string
                    required:
                    - name
                    type: object
                required:
                - name
                - owner
                - secretRef
                type: object
              repos:
                description: |-
                  repos is a list of candidate repositories for the triage step.
                  The triage step selects which repo to use based on the ticket content.
                items:
                  description: RepoCandidate describes a candidate repository for
                    triage.
                  properties:
                    description:
                      description: description helps the AI understand what this repo
                        is for.
                      type: string
                    forkOwner:
                      description: forkOwner is the owner of the fork to push to.
                        Defaults to owner.
                      type: string
                    name:
                      description: name is the GitHub repository name.
                      type: string
                    owner:
                      description: owner is the GitHub repository owner.
                      type: string
                    secretRef:
                      description: secretRef references a K8s Secret containing the
                        git token.
                      properties:
                        key:
                          default: token
                          description: key is the key within the Secret. Defaults
                            to "token".
                          type: string
                        name:
                          description: name is the name of the Secret.
                          type: string
                      required:
                      - name
                      type: object
                  required:
                  - name
                  - owner
                  type: object
                type: array
              steps:
                description: steps defines the ordered list of pipeline steps.
                items:
                  description: StepSpec defines a single pipeline step.
                  properties:
                    branchTemplate:
                      description: branchTemplate is a Go template for the branch
                        name (git-checkout only).
                      type: string
                    commands:
                      description: commands is a list of shell commands to run (shell
                        only).
                      items:
                        type: string
                      type: array
                    confidenceThreshold:
                      default: "0.7"
                      description: |-
                        confidenceThreshold is the minimum confidence for the triage step
                        to auto-select a repo (0.0-1.0). Below this, pipeline waits for user input.
                      type: string
                    dind:
                      description: |-
                        dind enables a Docker-in-Docker sidecar for this step.
                        Allows running docker, kind, and container-based tests.
                        Requires a privileged sidecar — use only when needed.
                      type: boolean
                    failureFile:
                      description: |-
                        failureFile is a path to a file that, if it exists after the AI step completes,
                        causes the step to be marked as failed. Used to detect test failures — the AI
                        writes a report to this file, and the container exits non-zero.
                      type: string
                    image:
                      description: image overrides the default image for this step
                        (shell only).
                      type: string
                    maxRetries:
                      default: 0
                      description: maxRetries is the maximum number of retry attempts.
                      type: integer
                    name:
                      description: name is the step identifier.
                      type: string
                    onFailure:
                      description: onFailure is the step name to jump back to on failure.
                      type: string
                    promptTemplate:
                      description: promptTemplate is a Go template for the AI prompt
                        (ai and triage steps).
                      type: string
                    requireApproval:
                      description: |-
                        requireApproval pauses the pipeline before running this step and waits
                        for explicit user approval via the dashboard. Useful as a gate before
                        pushing AI-generated code.
                      type: boolean
                    type:
                      description: type is the step type.
                      enum:
                      - git-checkout
                      - ai
                      - shell
                      - git-push
                      - triage
                      type: string
                  required:
                  - name
                  - type
                  type: object
                minItems: 1
                type: array
              trigger:
                description: trigger configures how new pipeline runs are created.
                properties:
                  github:
                    description: github configures GitHub Issues polling.
                    properties:
                      assignee:
                        description: assignee filters issues by this assignee.
                        type: string
                      labels:
                        description: labels filters issues by these labels. Empty
                          means no label filter.
                        items:
                          type: string
                        type: array
                      owner:
                        description: owner is the GitHub repository owner (for issue
                          fetching).
                        type: string
                      pollInterval:
                        default: 30s
                        description: pollInterval is how often to check for new issues
                          (e.g. "30s", "5m").
                        type: string
                      repo:
                        description: repo is the GitHub repository name (for issue
                          fetching).
                        type: string
                      secretRef:
                        description: |-
                          secretRef references a K8s Secret containing the GitHub token.
                          The secret must have a key named "token".
                        properties:
                          key:
                            default: token
                            description: key is the key within the Secret. Defaults
                              to "token".
                            type: string
                          name:
                            description: name is the name of the Secret.
                            type: string
                        required:
                        - name
                        type: object
                    required:
                    - assignee
                    - owner
                    - repo
                    - secretRef
                    type: object
                  jira:
                    description: jira configures Jira Issues polling.
                    properties:
                      jql:
                        description: jql is the JQL query to find issues (e.g. 'project
                          = PROJ AND assignee = currentUser()').
                        type: string
                      pollInterval:
                        default: 60s
                        description: pollInterval is how often to check for new issues
                          (e.g. "30s", "5m").
                        type: string
                      secretRef:
                        description: |-
                          secretRef references a K8s Secret containing Jira credentials.
                          For Jira Cloud: key "email" + key "token" (API token, Basic auth).
                          For Jira Server/DC: key "token" (PAT, Bearer auth).
                        properties:
                          key:
                            default: token
                            description: key is the key within the Secret. Defaults
                              to "token".
                            type: string
                          name:
                            description: name is the name of the Secret.
                            type: string
                        required:
                        - name
                        type: object
                      url:
                        description: url is the Jira instance URL (e.g. "https://mycompany.atlassian.net").
                        type: string
                    required:
                    - jql
                    - secretRef
                    - url
                    type: object
                type: object
            required:
            - ai
            - steps
            - trigger
            type: object
          status:
            description: PipelineStatus defines the observed state of Pipeline.
            properties:
              conditions:
                description: conditions represent the current state of the Pipeline.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              lastPollTime:
                description: lastPollTime is the last time the trigger polled for
                  issues.
                format: date-time
                type: string
              pollerActive:
                description: pollerActive indicates whether the trigger poller is
                  running.
                type: boolean
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
