---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: pipelines.ai.aipipelines.io
spec:
  group: ai.aipipelines.io
  names:
    kind: Pipeline
    listKind: PipelineList
    plural: pipelines
    singular: pipeline
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.triggerType
      name: Trigger
      type: string
    - jsonPath: .status.pollerActive
      name: Poller
      type: boolean
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Pipeline is the Schema for the pipelines API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: PipelineSpec defines the desired state of Pipeline.
            properties:
              ai:
                description: ai configures the AI runtime (container image, env, secrets).
                properties:
                  credentialsMountPath:
                    default: /tmp/gcp-creds.json
                    description: credentialsMountPath is where to mount the credentials
                      file inside the AI container.
                    type: string
                  env:
                    additionalProperties:
                      type: string
                    description: env is additional environment variables for the AI
                      container.
                    type: object
                  image:
                    description: image is the container image for AI steps (e.g. "ai-pipelines-claude:latest").
                    type: string
                  imagePullPolicy:
                    default: IfNotPresent
                    description: imagePullPolicy for the AI container. Set to "Never"
                      for pre-loaded images (e.g. kind).
                    type: string
                  secretRef:
                    description: secretRef references a K8s Secret to mount as credentials
                      into AI pods.
                    properties:
                      key:
                        default: token
                        description: key is the key within the Secret. Defaults to
                          "token".
                        type: string
                      name:
                        description: name is the name of the Secret.
                        type: string
                    required:
                    - name
                    type: object
                required:
                - image
                type: object
              repo:
                description: |-
                  repo configures the git repository for checkout/push steps.
                  Required unless the pipeline uses a triage step to select the repo.
                properties:
                  forkOwner:
                    description: forkOwner is the owner of the fork to push to. Defaults
                      to owner.
                    type: string
                  name:
                    description: name is the GitHub repository name.
                    type: string
                  owner:
                    description: owner is the GitHub repository owner.
                    type: string
                  secretRef:
                    description: |-
                      secretRef references a K8s Secret containing the git token.
                      The secret must have a key named "token".
                    properties:
                      key:
                        default: token
                        description: key is the key within the Secret. Defaults to
                          "token".
                        type: string
                      name:
                        description: name is the name of the Secret.
                        type: string
                    required:
                    - name
                    type: object
                required:
                - name
                - owner
                - secretRef
                type: object
              repos:
                description: |-
                  repos is a list of candidate repositories for the triage step.
                  The triage step selects which repo to use based on the ticket content.
                items:
                  description: RepoCandidate describes a candidate repository for
                    triage.
                  properties:
                    description:
                      description: description helps the AI understand what this repo
                        is for.
                      type: string
                    forkOwner:
                      description: forkOwner is the owner of the fork to push to.
                        Defaults to owner.
                      type: string
                    name:
                      description: name is the GitHub repository name.
                      type: string
                    owner:
                      description: owner is the GitHub repository owner.
                      type: string
                    secretRef:
                      description: secretRef references a K8s Secret containing the
                        git token.
                      properties:
                        key:
                          default: token
                          description: key is the key within the Secret. Defaults
                            to "token".
                          type: string
                        name:
                          description: name is the name of the Secret.
                          type: string
                      required:
                      - name
                      type: object
                  required:
                  - name
                  - owner
                  type: object
                type: array
              steps:
                description: steps defines the ordered list of pipeline steps.
                items:
                  description: StepSpec defines a single pipeline step.
                  properties:
                    branchTemplate:
                      description: branchTemplate is a Go template for the branch
                        name (git-checkout only).
                      type: string
                    commands:
                      description: commands is a list of shell commands to run (shell
                        only).
                      items:
                        type: string
                      type: array
                    confidenceThreshold:
                      default: "0.7"
                      description: |-
                        confidenceThreshold is the minimum confidence for the triage step
                        to auto-select a repo (0.0-1.0). Below this, pipeline waits for user input.
                      type: string
                    dind:
                      description: |-
                        dind enables a Docker-in-Docker sidecar for this step.
                        Allows running docker, kind, and container-based tests.
                        Requires a privileged sidecar — use only when needed.
                      type: boolean
                    env:
                      description: |-
                        env is a list of environment variables for this step's container.
                        Supports plain values and valueFrom (secretKeyRef, configMapKeyRef, etc.).
                        For AI steps, these are merged with (and override) spec.ai.env.
                      items:
                        description: EnvVar represents an environment variable present
                          in a Container.
                        properties:
                          name:
                            description: |-
                              Name of the environment variable.
                              May consist of any printable ASCII characters except '='.
                            type: string
                          value:
                            description: |-
                              Variable references $(VAR_NAME) are expanded
                              using the previously defined environment variables in the container and
                              any service environment variables. If a variable cannot be resolved,
                              the reference in the input string will be unchanged. Double $$ are reduced
                              to a single $, which allows for escaping the $(VAR_NAME) syntax: i.e.
                              "$$(VAR_NAME)" will produce the string literal "$(VAR_NAME)".
                              Escaped references will never be expanded, regardless of whether the variable
                              exists or not.
                              Defaults to "".
                            type: string
                          valueFrom:
                            description: Source for the environment variable's value.
                              Cannot be used if value is not empty.
                            properties:
                              configMapKeyRef:
                                description: Selects a key of a ConfigMap.
                                properties:
                                  key:
                                    description: The key to select.
                                    type: string
                                  name:
                                    default: ""
                                    description: |-
                                      Name of the referent.
                                      This field is effectively required, but due to backwards compatibility is
                                      allowed to be empty. Instances of this type with an empty value here are
                                      almost certainly wrong.
                                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                                    type: string
                                  optional:
                                    description: Specify whether the ConfigMap or
                                      its key must be defined
                                    type: boolean
                                required:
                                - key
                                type: object
                                x-kubernetes-map-type: atomic
                              fieldRef:
                                description: |-
                                  Selects a field of the pod: supports metadata.name, metadata.namespace, `metadata.labels['<KEY>']`, `metadata.annotations['<KEY>']`,
                                  spec.nodeName, spec.serviceAccountName, status.hostIP, status.podIP, status.podIPs.
                                properties:
                                  apiVersion:
                                    description: Version of the schema the FieldPath
                                      is written in terms of, defaults to "v1".
                                    type: string
                                  fieldPath:
                                    description: Path of the field to select in the
                                      specified API version.
                                    type: string
                                required:
                                - fieldPath
                                type: object
                                x-kubernetes-map-type: atomic
                              fileKeyRef:
                                description: |-
                                  FileKeyRef selects a key of the env file.
                                  Requires the EnvFiles feature gate to be enabled.
                                properties:
                                  key:
                                    description: |-
                                      The key within the env file. An invalid key will prevent the pod from starting.
                                      The keys defined within a source may consist of any printable ASCII characters except '='.
                                      During Alpha stage of the EnvFiles feature gate, the key size is limited to 128 characters.
                                    type: string
                                  optional:
                                    default: false
                                    description: |-
                                      Specify whether the file or its key must be defined. If the file or key
                                      does not exist, then the env var is not published.
                                      If optional is set to true and the specified key does not exist,
                                      the environment variable will not be set in the Pod's containers.

                                      If optional is set to false and the specified key does not exist,
                                      an error will be returned during Pod creation.
                                    type: boolean
                                  path:
                                    description: |-
                                      The path within the volume from which to select the file.
                                      Must be relative and may not contain the '..' path or start with '..'.
                                    type: string
                                  volumeName:
                                    description: The name of the volume mount containing
                                      the env file.
                                    type: string
                                required:
                                - key
                                - path
                                - volumeName
                                type: object
                                x-kubernetes-map-type: atomic
                              resourceFieldRef:
                                description: |-
                                  Selects a resource of the container: only resources limits and requests
                                  (limits.cpu, limits.memory, limits.ephemeral-storage, requests.cpu, requests.memory and requests.ephemeral-storage) are currently supported.
                                properties:
                                  containerName:
                                    description: 'Container name: required for volumes,
                                      optional for env vars'
                                    type: string
                                  divisor:
                                    anyOf:
                                    - type: integer
                                    - type: string
                                    description: Specifies the output format of the
                                      exposed resources, defaults to "1"
                                    pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                                    x-kubernetes-int-or-string: true
                                  resource:
                                    description: 'Required: resource to select'
                                    type: string
                                required:
                                - resource
                                type: object
                                x-kubernetes-map-type: atomic
                              secretKeyRef:
                                description: Selects a key of a secret in the pod's
                                  namespace
                                properties:
                                  key:
                                    description: The key of the secret to select from.  Must
                                      be a valid secret key.
                                    type: string
                                  name:
                                    default: ""
                                    description: |-
                                      Name of the referent.
                                      This field is effectively required, but due to backwards compatibility is
                                      allowed to be empty. Instances of this type with an empty value here are
                                      almost certainly wrong.
                                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                                    type: string
                                  optional:
                                    description: Specify whether the Secret or its
                                      key must be defined
                                    type: boolean
                                required:
                                - key
                                type: object
                                x-kubernetes-map-type: atomic
                            type: object
                        required:
                        - name
                        type: object
                      type: array
                    failureFile:
                      description: |-
                        failureFile is a path to a file that, if it exists after the AI step completes,
                        causes the step to be marked as failed. Used to detect test failures — the AI
                        writes a report to this file, and the container exits non-zero.
                      type: string
                    image:
                      description: image overrides the default image for this step
                        (shell only).
                      type: string
                    maxRetries:
                      default: 0
                      description: maxRetries is the maximum number of retry attempts.
                      type: integer
                    name:
                      description: name is the step identifier.
                      type: string
                    onFailure:
                      description: onFailure is the step name to jump back to on failure.
                      type: string
                    promptTemplate:
                      description: |-
                        promptTemplate is a Go template for the AI prompt (ai and triage steps).
                        When workflowRef is set, this serves as the issue/task context instead of methodology instructions.
                      type: string
                    reportFile:
                      description: |-
                        reportFile is the path to a file in the workspace to display in the dashboard
                        (watch-report only). The step reads this file and outputs it so the dashboard
                        can render it as markdown.
                      type: string
                    requireApproval:
                      description: |-
                        requireApproval pauses the pipeline before running this step and waits
                        for explicit user approval via the dashboard. Useful as a gate before
                        pushing AI-generated code.
                      type: boolean
                    secretMounts:
                      description: secretMounts mounts K8s Secrets as files into this
                        step's container.
                      items:
                        description: SecretMount mounts a K8s Secret (or a single
                          key from it) as a file.
                        properties:
                          key:
                            description: |-
                              key optionally selects a single key from the Secret.
                              When set, only that key is mounted as a file at mountPath.
                              When omitted, all keys are mounted as files in a directory at mountPath.
                            type: string
                          mountPath:
                            description: mountPath is the absolute path where the
                              secret will be mounted.
                            type: string
                          secretName:
                            description: secretName is the name of the Secret to mount.
                            type: string
                        required:
                        - mountPath
                        - secretName
                        type: object
                      type: array
                    type:
                      description: type is the step type.
                      enum:
                      - git-checkout
                      - ai
                      - shell
                      - git-push
                      - triage
                      - git-checkout-pr
                      - watch-report
                      type: string
                    workflowRef:
                      description: |-
                        workflowRef points to a workflow in a GitHub repo.
                        When set, promptTemplate becomes the issue/task context passed as the initial user message.
                      properties:
                        path:
                          description: path is the directory within the repository
                            containing the workflow.
                          type: string
                        ref:
                          description: ref is the git ref (branch, tag, commit). Defaults
                            to HEAD.
                          type: string
                        repo:
                          description: repo is the GitHub repository in owner/repo
                            format.
                          type: string
                        secretRef:
                          description: |-
                            secretRef references a K8s Secret containing the git token for cloning
                            the workflow repo. If omitted, falls back to the pipeline's repo secretRef
                            or the trigger's secretRef.
                          properties:
                            key:
                              default: token
                              description: key is the key within the Secret. Defaults
                                to "token".
                              type: string
                            name:
                              description: name is the name of the Secret.
                              type: string
                          required:
                          - name
                          type: object
                      required:
                      - path
                      - repo
                      type: object
                  required:
                  - name
                  - type
                  type: object
                minItems: 1
                type: array
              trigger:
                description: |-
                  trigger configures how new pipeline runs are created.
                  If omitted, the pipeline only supports spot runs (manual creation).
                properties:
                  github:
                    description: github configures GitHub Issues polling.
                    properties:
                      assignee:
                        description: assignee filters issues by this assignee.
                        type: string
                      labels:
                        description: labels filters issues by these labels. Empty
                          means no label filter.
                        items:
                          type: string
                        type: array
                      owner:
                        description: owner is the GitHub repository owner (for issue
                          fetching).
                        type: string
                      pollInterval:
                        default: 30s
                        description: pollInterval is how often to check for new issues
                          (e.g. "30s", "5m").
                        type: string
                      repo:
                        description: repo is the GitHub repository name (for issue
                          fetching).
                        type: string
                      secretRef:
                        description: |-
                          secretRef references a K8s Secret containing the GitHub token.
                          The secret must have a key named "token".
                        properties:
                          key:
                            default: token
                            description: key is the key within the Secret. Defaults
                              to "token".
                            type: string
                          name:
                            description: name is the name of the Secret.
                            type: string
                        required:
                        - name
                        type: object
                    required:
                    - assignee
                    - owner
                    - repo
                    - secretRef
                    type: object
                  githubPR:
                    description: githubPR configures GitHub Pull Request polling.
                    properties:
                      excludeAuthors:
                        description: |-
                          excludeAuthors is a list of GitHub usernames whose PRs should be ignored
                          (e.g. "dependabot[bot]", "renovate[bot]").
                        items:
                          type: string
                        type: array
                      owner:
                        description: owner is the GitHub repository owner.
                        type: string
                      pollInterval:
                        default: 60s
                        description: pollInterval is how often to check for new PRs
                          (e.g. "30s", "5m").
                        type: string
                      repo:
                        description: repo is the GitHub repository name.
                        type: string
                      secretRef:
                        description: |-
                          secretRef references a K8s Secret containing the GitHub token.
                          The secret must have a key named "token".
                        properties:
                          key:
                            default: token
                            description: key is the key within the Secret. Defaults
                              to "token".
                            type: string
                          name:
                            description: name is the name of the Secret.
                            type: string
                        required:
                        - name
                        type: object
                    required:
                    - owner
                    - repo
                    - secretRef
                    type: object
                  githubPRReview:
                    description: githubPRReview configures GitHub PR review polling.
                    properties:
                      owner:
                        description: owner is the GitHub repository owner.
                        type: string
                      pollInterval:
                        default: 30s
                        description: pollInterval is how often to check for new PR
                          reviews (e.g. "30s", "5m").
                        type: string
                      repo:
                        description: repo is the GitHub repository name.
                        type: string
                      reviewer:
                        description: reviewer filters PRs by this reviewer.
                        type: string
                      secretRef:
                        description: |-
                          secretRef references a K8s Secret containing the GitHub token.
                          The secret must have a key named "token".
                        properties:
                          key:
                            default: token
                            description: key is the key within the Secret. Defaults
                              to "token".
                            type: string
                          name:
                            description: name is the name of the Secret.
                            type: string
                        required:
                        - name
                        type: object
                    required:
                    - owner
                    - repo
                    - reviewer
                    - secretRef
                    type: object
                  jira:
                    description: jira configures Jira Issues polling.
                    properties:
                      jql:
                        description: jql is the JQL query to find issues (e.g. 'project
                          = PROJ AND assignee = currentUser()').
                        type: string
                      pollInterval:
                        default: 60s
                        description: pollInterval is how often to check for new issues
                          (e.g. "30s", "5m").
                        type: string
                      secretRef:
                        description: |-
                          secretRef references a K8s Secret containing Jira credentials.
                          For Jira Cloud: key "email" + key "token" (API token, Basic auth).
                          For Jira Server/DC: key "token" (PAT, Bearer auth).
                        properties:
                          key:
                            default: token
                            description: key is the key within the Secret. Defaults
                              to "token".
                            type: string
                          name:
                            description: name is the name of the Secret.
                            type: string
                        required:
                        - name
                        type: object
                      url:
                        description: url is the Jira instance URL (e.g. "https://mycompany.atlassian.net").
                        type: string
                    required:
                    - jql
                    - secretRef
                    - url
                    type: object
                  schedule:
                    description: schedule configures cron-based scheduled runs.
                    properties:
                      prompt:
                        description: prompt is the task description for each scheduled
                          run.
                        type: string
                      schedule:
                        description: |-
                          schedule is a cron expression (e.g. "0 0 * * 0" for weekly Sunday midnight).
                          Uses standard 5-field cron syntax (minute, hour, day-of-month, month, day-of-week).
                        type: string
                    required:
                    - prompt
                    - schedule
                    type: object
                type: object
            required:
            - ai
            - steps
            type: object
          status:
            description: PipelineStatus defines the observed state of Pipeline.
            properties:
              conditions:
                description: conditions represent the current state of the Pipeline.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              lastPollTime:
                description: lastPollTime is the last time the trigger polled for
                  issues.
                format: date-time
                type: string
              pollerActive:
                description: pollerActive indicates whether the trigger poller is
                  running.
                type: boolean
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
