apiVersion: ai.aipipelines.io/v1alpha1
kind: Pipeline
metadata:
  name: weekly-security-scan
  namespace: default
spec:
  # Schedule trigger — runs the pipeline on a cron schedule.
  # Uses standard 5-field cron syntax: minute hour day-of-month month day-of-week

  trigger:
    schedule:
      schedule: "0 0 * * 0"  # every Sunday at midnight
      prompt: |
        Perform a security audit of this repository:
        1. Check for known vulnerabilities in dependencies (outdated packages, CVEs)
        2. Scan for hardcoded credentials, API keys, or secrets
        3. Review security-sensitive configurations
        4. Check for common vulnerability patterns (SQL injection, XSS, command injection, etc.)

        Write a detailed report to /workspace/artifacts/security-report.md with:
        - Summary of findings
        - Severity ratings (critical/high/medium/low)
        - Recommended fixes for each finding

  repo:
    owner: "your-github-org"
    name: "your-repo"
    forkOwner: "your-github-username"
    secretRef:
      name: github-token

  ai:
    image: "localhost/ai-pipelines-claude:latest"
    secretRef:
      name: ai-credentials
      key: credentials.json
    credentialsMountPath: "/tmp/gcp-creds.json"
    imagePullPolicy: Never

  steps:
    - name: checkout
      type: git-checkout
      branchTemplate: "ai/security-scan-{{.Timestamp}}"

    - name: scan
      type: ai
      promptTemplate: |
        {{.Description}}

        You are on branch `{{.Branch}}`. Stay on this branch.
        Do NOT run git add, git commit, or git push.

    - name: push
      type: git-push
      requireApproval: true
